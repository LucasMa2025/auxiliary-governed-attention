# AGA 简单监控 UI 配置
# 
# 使用方法:
#   from aga.monitoring import SimpleUIConfig
#   config = SimpleUIConfig.from_file("config/ui_config.yaml")

ui:
  # 服务地址
  host: "0.0.0.0"
  port: 8082
  
  # 访问口令（生产环境请修改）
  access_token: "aga-demo-token"
  
  # Flask 密钥（生产环境请修改）
  secret_key: "aga-secret-key-change-in-production"
  
  # 调试模式
  debug: false

# 也可以通过环境变量设置:
#   AGA_UI_HOST=0.0.0.0
#   AGA_UI_PORT=8082
#   AGA_UI_TOKEN=your-secret-token
#   AGA_UI_SECRET=your-secret-key
#   AGA_UI_DEBUG=false
